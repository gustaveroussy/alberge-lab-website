# site properties and page defaults
title: Integrated Genomics in Pediatric Oncology
subtitle: Emerging Research Group – Jean-Baptiste Alberge, Gustave Roussy
description: We use genomics tools to decode how pediatric cancers evolve, from early mutations to relapse. Our emerging team is hosted within Inserm U1360 Research Unit "Oncogenesis, Resistance, and Therapeutic Targets of Pediatric Cancers" led by Thomas Mercher.
header: images/background.jpg
footer: images/background.jpg
proofer: false

# site social media and other links
links:
  email: jeanbaptiste.alberge@gustaveroussy.fr
  orcid: 0000-0002-4218-7294
  google-scholar: 79SGzYUAAAAJ
  github: jalberge
  linkedin: jean-baptiste-alberge

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
